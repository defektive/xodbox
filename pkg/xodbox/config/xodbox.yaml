---
## Global defaults. Uncommenting this block overrides ALL defaults, so keep the
## notify_string/server_name lines if you set it.
#defaults:
#  notify_string: l
#  server_name: BreakfastBot
#  ## Drop events from noisy sources entirely (no DB row, no notification, no log
#  ## line). Use these to silence a known callout — e.g. a leftover beacon from an
#  ## old test that keeps calling back every second. An event matching EITHER rule
#  ## is dropped. Prune already-recorded rows with: xodbox interactions purge
#  ignore_cidrs: "203.0.113.7,10.0.0.0/8" # comma-separated source IPs/CIDRs to drop
#  ignore_pattern: "^HTTPX GET /old-test-callback" # regex vs "HANDLER ACTION DETAIL from IP"
## Docs: https://defektive.github.io/xodbox/docs/pkg/handlers/
handlers:
  ## Docs: https://defektive.github.io/xodbox/docs/pkg/handlers/dns/
#  - handler: DNS
#    listener: 127.0.10.1:53
#    default_ip: 127.0.0.1
  ## Docs: https://defektive.github.io/xodbox/docs/pkg/handlers/httpx/
  - handler: HTTPX
#    payload_dir: payloads/httpx
#    static_dir: static
#    acme_email: youremail.real.place
#    acme_accept: false # this should be true. you must accept :D
#    acme_url: https://acme-staging-v02.api.letsencrypt.org/directory # when ready use real URL https://acme-v02.api.letsencrypt.org/directory
#    tls_names: "*.example.com,example.com"
#    dns_provider: namecheap # or route53
#    dns_provider_api_user: namecheap-user
#    dns_provider_api_key: namecheap-secret
#    bot_exempt_private: "false" # apply bot detection to local/private IPs too (default exempts them)
#    ui_path: /admin # mount the embedded admin web UI here (empty = disabled)
#    ui_allow_cidrs: "127.0.0.1/32,10.0.0.0/8" # restrict UI access to these source CIDRs (peer IP)
#    admin_listener: 127.0.0.1:9091 # serve the admin UI on this isolated bind instead of the public listener
#    public_url: https://oob.example.com # externally-reachable base URL; the UI's sink "Copy HTTP link" uses it (empty = UI origin)
#    notify_logins: "true" # emit an event on each successful admin login (fires notifiers matching "^HTTPX Login")
#    max_upload_size: "0" # per-file size cap for multipart uploads in bytes; 0 = no limit
#    # OIDC/SSO login for the admin UI (optional; runs alongside username/password login).
#    oidc_issuer: https://accounts.example.com # OIDC provider issuer URL (discovery is fetched from here)
#    oidc_client_id: xodbox
#    oidc_client_secret: super-secret # optional for public/PKCE clients
#    oidc_redirect_url: https://oob.example.com/admin/api/auth/oidc/callback # optional; derived from the request when unset. Must match a redirect URI registered with the IdP.
#    oidc_scopes: "openid,profile,email" # optional; openid is always included
#    oidc_default_role: user # role for provisioned users (user or admin); default user
#    oidc_groups_claim: groups # ID-token claim inspected for group membership; default "groups"
#    oidc_admin_group: xodbox-admins # users whose groups claim contains this value get the admin role
#    oidc_button_label: "Sign in with SSO" # label for the SSO button on the login page
    listener: :80
  ## Docs: https://defektive.github.io/xodbox/docs/pkg/handlers/smb/
