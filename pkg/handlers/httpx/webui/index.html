<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="robots" content="noindex, nofollow" />
    <title>xodbox admin</title>

    <!-- PWA / installable. /__XODBOX_BASE__/ is the Vite base ("/__XODBOX_BASE__/"),
         which the Go server rewrites to the configured ui_path; the manifest
         itself uses relative URLs so it resolves under any mount point. -->
    <link rel="icon" type="image/svg+xml" href="/__XODBOX_BASE__/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/__XODBOX_BASE__/favicon-32.png" />
    <link rel="apple-touch-icon" href="/__XODBOX_BASE__/apple-touch-icon.png" />
    <link rel="manifest" href="/__XODBOX_BASE__/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="xodbox" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <script type="module" crossorigin src="/__XODBOX_BASE__/assets/index-a41V112O.js"></script>
    <link rel="stylesheet" crossorigin href="/__XODBOX_BASE__/assets/index-DErNW5ZE.css">
  </head>
  <body>
    <!-- The Go server replaces {{XODBOX_BASE}} with the configured ui_path
         (e.g. "/admin/") when serving this file. The value rides on a data
         attribute rather than an inline script so the strict CSP
         (script-src 'self', no 'unsafe-inline') needs no exception. Left as-is
         in dev, where base.ts falls back to "/". -->
    <div
      id="root"
      data-xodbox-base="{{XODBOX_BASE}}"
      data-xodbox-sink-base="{{XODBOX_SINK_BASE}}"
    ></div>
  </body>
</html>
